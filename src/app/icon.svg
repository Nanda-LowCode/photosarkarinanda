<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue rounded square background -->
  <rect width="32" height="32" rx="7" fill="#1e40af"/>
  <!-- Camera body -->
  <rect x="3" y="11" width="26" height="17" rx="2.5" fill="white"/>
  <!-- Viewfinder bump -->
  <rect x="10" y="7" width="10" height="5.5" rx="1.5" fill="white"/>
  <!-- Lens outer ring (blue) -->
  <circle cx="16" cy="19.5" r="5.5" fill="#1e40af"/>
  <!-- Lens ring (white) -->
  <circle cx="16" cy="19.5" r="3.5" fill="white"/>
  <!-- Lens center (blue) -->
  <circle cx="16" cy="19.5" r="1.5" fill="#1e40af"/>
  <!-- Flash dot -->
  <circle cx="25" cy="15" r="1.2" fill="#93c5fd"/>
</svg>

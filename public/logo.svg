<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 182 38">
  <!-- Camera body -->
  <rect x="0" y="9" width="28" height="21" rx="3.5" fill="white"/>
  <!-- Viewfinder bump -->
  <rect x="9" y="4" width="10" height="6" rx="2" fill="white"/>
  <!-- Lens outer (blue = header bg, creates depth) -->
  <circle cx="14" cy="19.5" r="7" fill="#1e40af"/>
  <!-- Lens ring -->
  <circle cx="14" cy="19.5" r="5" fill="white"/>
  <!-- Lens center -->
  <circle cx="14" cy="19.5" r="2.5" fill="#1e40af"/>
  <!-- Flash indicator -->
  <circle cx="23.5" cy="13" r="1.5" fill="#bfdbfe"/>

  <!-- "Photo" bold white + "Sarkari" lighter blue -->
  <text x="37" y="26"
    font-family="system-ui,-apple-system,Helvetica Neue,Arial,sans-serif"
    font-size="20"
    font-weight="700"
    fill="white">Photo<tspan fill="#bfdbfe" font-weight="400">Sarkari</tspan></text>
</svg>
